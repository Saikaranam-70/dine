# ============================================================
# NGINX Load Balancer Config — Restaurant SaaS
# Place at: /etc/nginx/nginx.conf or /etc/nginx/conf.d/restaurant.conf
# ============================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging ----
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ---- Performance ----
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.api+json;

    # ---- Buffer Sizes ----
    client_body_buffer_size     128k;
    client_max_body_size        10m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 16k;
    output_buffers              1 32k;
    postpone_output             1460;

    # ---- Timeouts ----
    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          30s;
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ---- Security Headers ----
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Rate Limiting Zones ----
    limit_req_zone $binary_remote_addr zone=api:10m     rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=2r/s;
    limit_req_zone $binary_remote_addr zone=orders:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static:10m  rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ---- Upstream — Node.js App Servers (Round-Robin LB) ----
    upstream restaurant_backend {
        # Round-robin by default; use least_conn for uneven loads
        least_conn;

        server 127.0.0.1:5000 weight=5 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5001 weight=5 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5002 weight=5 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5003 weight=5 max_fails=3 fail_timeout=30s;

        # Health check (NGINX Plus only; for OSS use passive health checks above)
        # health_check interval=10 fails=3 passes=2;

        keepalive 64;
    }

    # ---- Upstream — Socket.IO (sticky sessions required) ----
    upstream socketio_backend {
        ip_hash; # Sticky sessions — REQUIRED for Socket.IO

        server 127.0.0.1:5000;
        server 127.0.0.1:5001;
        server 127.0.0.1:5002;
        server 127.0.0.1:5003;

        keepalive 32;
    }

    # ---- Cache Zone for static menu data ----
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # ============================================================
    # HTTP → HTTPS Redirect
    # ============================================================
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # ============================================================
    # MAIN HTTPS SERVER
    # ============================================================
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        # ---- SSL ----
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling        on;
        ssl_stapling_verify on;

        root /var/www/restaurant-frontend/dist;

        # ---- Connection limit ----
        limit_conn conn 100;

        # ============================================================
        # Socket.IO — Sticky Session Upstream
        # ============================================================
        location /socket.io/ {
            proxy_pass         http://socketio_backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;

            proxy_buffering off;
        }

        # ============================================================
        # API — Auth endpoints (strict rate limit)
        # ============================================================
        location /api/admin/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://restaurant_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID $request_id;
        }

        # ============================================================
        # API — Order endpoints
        # ============================================================
        location /api/orders {
            limit_req zone=orders burst=20 nodelay;

            proxy_pass         http://restaurant_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # API — Menu (with NGINX caching for GET requests)
        # ============================================================
        location /api/menu/ {
            limit_req zone=static burst=50 nodelay;

            # Cache GET menu requests
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_methods GET;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass         http://restaurant_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # API — General (all other)
        # ============================================================
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://restaurant_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer
            proxy_buffering on;
            proxy_buffer_size    4k;
            proxy_buffers        8 16k;
            proxy_busy_buffers_size 32k;
        }

        # ============================================================
        # Health Check (no rate limit, no logging)
        # ============================================================
        location = /health {
            access_log off;
            proxy_pass http://restaurant_backend;
            proxy_set_header Host $host;
        }

        # ============================================================
        # Static Frontend (SPA)
        # ============================================================
        location / {
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---- Block common attacks ----
        location ~* \.(php|asp|aspx|jsp)$ { return 404; }
        location ~ /\.ht { deny all; }
        location ~ /\. { deny all; }
    }
}
